<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nodari Chkuaselidze's personal page with links to GitHub, LinkedIn, and resume."
    />
    <script>
      (() => {
        const storageKey = "theme";
        const root = document.documentElement;
        const media = window.matchMedia("(prefers-color-scheme: dark)");

        const applyTheme = (theme) => {
          root.dataset.theme = theme;
        };

        const savedTheme = localStorage.getItem(storageKey);
        applyTheme(savedTheme || (media.matches ? "dark" : "light"));

        window.__theme = {
          getSavedTheme: () => localStorage.getItem(storageKey),
          setTheme: (theme) => {
            localStorage.setItem(storageKey, theme);
            applyTheme(theme);
          },
          clearTheme: () => {
            localStorage.removeItem(storageKey);
            applyTheme(media.matches ? "dark" : "light");
          },
        };

        media.addEventListener("change", (event) => {
          if (!window.__theme.getSavedTheme()) {
            applyTheme(event.matches ? "dark" : "light");
          }
        });
      })();
    </script>
    <title>Nodari Chkuaselidze</title>
    <style>
      :root {
        --bg: #faf8f2;
        --text: #1c1c1c;
        --muted: #666;
        --link: #0f766e;
        --link-hover: #115e59;
      }

      :root[data-theme="dark"] {
        --bg: #111315;
        --text: #ece7de;
        --muted: #a39b90;
        --link: #6ee7d8;
        --link-hover: #99f6e4;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 48px 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        transition: background-color 160ms ease, color 160ms ease;
      }

      main {
        width: min(560px, 100%);
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .eyebrow a {
        color: inherit;
        text-decoration: none;
      }

      .eyebrow a:hover,
      .eyebrow a:focus-visible {
        color: var(--text);
        text-decoration: underline;
      }

      .eyebrow a:visited {
        color: inherit;
      }

      .theme-toggle {
        border: 0;
        padding: 0;
        color: var(--muted);
        background: transparent;
        font: inherit;
        cursor: pointer;
      }

      .theme-toggle:hover,
      .theme-toggle:focus-visible {
        color: var(--text);
        text-decoration: underline;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: 0;
      }

      .headline {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .social {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 0;
      }

      .social a {
        display: inline-flex;
        align-items: center;
        color: var(--muted);
        text-decoration: none;
      }

      .social a:visited {
        color: var(--muted);
      }

      .social a:hover,
      .social a:focus-visible {
        color: var(--text);
      }

      .social svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .summary {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .summary a {
        color: var(--link);
        text-decoration: none;
        font-weight: 500;
      }

      .summary a:visited {
        color: var(--link);
      }

      .summary a:hover,
      .summary a:focus-visible {
        color: var(--link-hover);
        text-decoration: underline;
      }

      @media (max-width: 640px) {
        body {
          padding: 28px 18px;
        }

        h1 {
          font-size: 1.35rem;
        }

        .headline {
          align-items: baseline;
        }

        .summary {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <p class="eyebrow"><a href="/">nodech.dev</a></p>
        <button class="theme-toggle" type="button" aria-label="Toggle theme">theme</button>
      </div>
      <div class="headline">
        <h1>Nodari Chkuaselidze</h1>
        <p class="social">
          <a href="https://github.com/nodech" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
            </svg>
          </a>
          <a href="https://www.linkedin.com/in/nodari-chkuaselidze-95a829b1" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.98 3.5A2.49 2.49 0 1 0 5 8.48a2.49 2.49 0 0 0-.02-4.98ZM3 9h4v12H3V9Zm7 0h3.83v1.64h.05c.53-1.01 1.84-2.08 3.79-2.08C21.2 8.56 22 10.85 22 14.02V21h-4v-6.17c0-1.47-.03-3.36-2.05-3.36-2.06 0-2.37 1.6-2.37 3.25V21h-4V9Z"></path>
            </svg>
          </a>
        </p>
      </div>
      <p class="summary">
        I work on backend systems, protocol stuff, and dev tooling. More in
        <a href="/resume.html">my resume</a>.
      </p>
    </main>
    <script>
      (() => {
        const button = document.querySelector(".theme-toggle");
        const root = document.documentElement;

        const updateLabel = () => {
          const saved = window.__theme.getSavedTheme();
          const active = root.dataset.theme;
          button.textContent = saved ? `theme: ${active}` : `theme: ${active} (auto)`;
        };

        button.addEventListener("click", () => {
          const saved = window.__theme.getSavedTheme();
          const active = root.dataset.theme;

          if (!saved) {
            window.__theme.setTheme(active === "dark" ? "light" : "dark");
          } else if (saved === "dark") {
            window.__theme.setTheme("light");
          } else {
            window.__theme.clearTheme();
          }

          updateLabel();
        });

        updateLabel();
      })();
    </script>
  </body>
</html>
